###################################################################################################
# MODULE: mod-ale (AzerothCore Lua Engine)
###################################################################################################
[worldserver]

#    ALE.Enabled
#        Description: Enable the Lua scripting engine.
#        Default:     1 - (Enabled)
ALE.Enabled = 1

#    ALE.TraceBack
#        Description: Include full Lua traceback in error messages.
#        Default:     1 - (Enabled)
ALE.TraceBack = 1

#    ALE.AutoReload
#        Description: Automatically reload changed Lua scripts.
#        Default:     1 - (Enabled)
ALE.AutoReload = 1

#    ALE.AutoReloadInterval
#        Description: Interval in seconds between file-change checks for auto-reload.
#        Default:     1
ALE.AutoReloadInterval = 1

#    ALE.BytecodeCache
#        Description: Cache compiled Lua bytecode to speed up script loading.
#        Default:     1 - (Enabled)
ALE.BytecodeCache = 1

#    ALE.ScriptPath
#        Description: Path relative to the worldserver binary where Lua scripts are located.
#        Default:     lua_scripts
ALE.ScriptPath = lua_scripts

#    ALE.RequirePaths
#        Description: Additional Lua require() search paths (semicolon-separated).
#        Default:     "" (empty — use engine defaults)
ALE.RequirePaths =

#    ALE.RequireCPaths
#        Description: Additional Lua C-module require() search paths (semicolon-separated).
#        Default:     "" (empty — use engine defaults)
ALE.RequireCPaths =
